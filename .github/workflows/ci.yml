name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: PazerOP/actions/tab-check-action@v1

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build AOT binary
        run: dotnet publish -c Release -r linux-x64

      - name: Upload .NET binary
        uses: actions/upload-artifact@v4
        with:
          name: ts0-linux-x64
          path: bin/Release/net10.0/linux-x64/publish/ts0

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ts0-linux-x64
          path: .

      - run: chmod +x ts0 && sudo mv ts0 /usr/local/bin/

      - name: Test init command
        working-directory: /tmp
        run: |
          mkdir test-project
          cd test-project
          ts0 init

      - name: Test build command
        working-directory: /tmp/test-project
        run: ts0 build

      - name: Test run command
        working-directory: /tmp/test-project
        run: ts0 run

      - name: Test test command
        working-directory: /tmp/test-project
        run: ts0 test

      - name: Test basic sample
        working-directory: samples/basic
        run: |
          npm install
          ts0 build
          ts0 test
