name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Build ts0
        run: node --experimental-strip-types src/cli.ts build

      - name: Link ts0 globally
        run: npm link

      - name: Test init command
        run: |
          mkdir -p /tmp/test-project
          cd /tmp/test-project
          ts0 init

      - name: Test build command
        run: |
          cd /tmp/test-project
          ts0 build

      - name: Test run command
        run: |
          cd /tmp/test-project
          ts0 run

      - name: Test test command
        run: |
          cd /tmp/test-project
          ts0 test

      - name: Test sample project
        run: |
          cd samples
          ts0 build
          ts0 test
