name: CI

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Build ts0
        run: node --experimental-strip-types src/cli.ts build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ts0
          path: dist/ts0

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ts0
          path: dist

      - name: Link ts0 globally
        run: npm link

      - name: Test init command
        working-directory: /tmp
        run: |
          mkdir test-project
          cd test-project
          ts0 init

      - name: Test build command
        working-directory: /tmp/test-project
        run: ts0 build

      - name: Test run command
        working-directory: /tmp/test-project
        run: ts0 run

      - name: Test test command
        working-directory: /tmp/test-project
        run: ts0 test

      - name: Test basic sample
        working-directory: samples/basic
        run: |
          ts0 build
          ts0 test

      - name: Test html sample
        working-directory: samples/html
        run: |
          ts0 build
          test -f dist/index.html
          # The bundled output must inline the JS and CSS, with no remaining
          # local src= or href= references to source files.
          grep -q '<style' dist/index.html
          grep -q 'getElementById' dist/index.html
          ! grep -qE '<script[^>]+src=' dist/index.html
          ! grep -qE '<link[^>]+rel=["'"'"']stylesheet["'"'"']' dist/index.html
          # CSS asset embedding: the body's background-image url() must be
          # rewritten to a data: URL so the bundle works from disk.
          grep -q 'data:image/png;base64' dist/index.html
          # Inline-module bundling: the inline <script type="module"> body
          # imports ./src/greet.ts; the bundled output must contain the
          # call site and resolved import.
          grep -q 'greeting("inline")' dist/index.html
          # Fetch interceptor injection: presence of the patched fetch and
          # the embedded shader text, with no leftover __ASSETS_JSON__.
          grep -q 'window.fetch' dist/index.html
          grep -q 'embedded by ts0' dist/index.html
          ! grep -q '__ASSETS_JSON__' dist/index.html
          # CLI flag overrides: build a different entry to a different
          # outfile without a ts0.json change.
          rm -rf dist
          ts0 build --entry index.html --outfile out/cli-flag.html
          test -f out/cli-flag.html

      - name: Upload html sample build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-sample
          path: samples/html/dist/index.html
